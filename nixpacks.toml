# Railway Nixpacks configuration
# Provides system-level dependencies required by the Discord bot:
#   - libopus / pkg-config: native build for @discordjs/opus
#   - ffmpeg: audio encoding/decoding
#   - python3: required by node-gyp (opus native build)
#   - yt-dlp: base install (ensure-ytdlp.sh upgrades to latest at start)

[phases.setup]
nixPkgs = ["python3", "libopus", "pkg-config", "ffmpeg", "yt-dlp", "curl"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "bash scripts/ensure-ytdlp.sh",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "pnpm --filter @workspace/api-server run start"
